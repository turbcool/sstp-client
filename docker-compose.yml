services:
  sstpc:
    build: .
    container_name: sstpc
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    privileged: true
    devices:
      - /dev/ppp:/dev/ppp
    environment:
      REMOTEHOST: ${REMOTEHOST}
      SSTP_USER: ${SSTP_USER}
      SSTP_PASSWORD: ${SSTP_PASSWORD}
      CERT_WARN: ${CERT_WARN:-}
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "ip link show ppp0 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
